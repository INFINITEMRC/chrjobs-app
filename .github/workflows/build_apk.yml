name: Build APK Fast
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/bubblewrap/bubblewrap:latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate APK
        run: |
          # هاد الكود كيستعمل حاوية جاهزة فيها كلشي
          bubblewrap init --manifest=https://chrsd-ca487.web.app/manifest.json --directory=./
          bubblewrap build --skipPasswordPrompt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-APK
          path: ./*.apk
