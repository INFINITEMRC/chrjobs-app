name: Build APK Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build APK
        run: |
          npm install -g @bubblewrap/cli
          # هاد الأمر كينشئ الملف أوتوماتيكياً بالمعلومات ديالك
          bubblewrap init --manifest=https://chrsd-ca487.web.app/manifest.json \
            --directory=./ \
            --packageId=com.chrjobs.app \
            --appName="CHR Jobs" \
            --host=chrsd-ca487.web.app \
            --metaData.noStatusUpdate
            
          # هاد السطر كيدير البناء (Build) مباشرة بلا ما يسول على JDK
          bubblewrap build --skipPasswordPrompt --jdkPath=/usr/lib/jvm/java-17-openjdk-amd64
          
        env:
          # هاد المتغير كيخلي Bubblewrap ما يسولش على التثبيت
          BUBBLEWRAP_SKIP_JDK_INSTALL: "true"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-APK
          path: ./*.apk
