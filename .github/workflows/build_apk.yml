name: Build APK Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK (Automatic)
        run: |
          npm install -g @bubblewrap/cli
          
          # هاد الخطوة هي السر: كنزربو عليه وكنصايبو الملف ديال الإعدادات قبل ما يسول
          bubblewrap init --manifest=https://chrsd-ca487.web.app/manifest.json \
            --directory=./ \
            --packageId=com.chrjobs.app \
            --appName="CHR Jobs" \
            --host=chrsd-ca487.web.app \
            --metaData.noStatusUpdate
            
          # هنا كنعطيوه الأمر باش يخدم بـ Java الموجودة في السيرفر
          bubblewrap build --skipPasswordPrompt --jdkPath=$JAVA_HOME
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-APK
          path: ./*.apk
