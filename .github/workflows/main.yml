name: Fast APK Generator
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK
        # هنا نخبره أن يستخدم البيئة الموجودة ولا يحاول تثبيت JDK
        run: |
          bubblewrap init --manifest=https://chrsd-ca487.web.app/manifest.json --directory=./
          bubblewrap build --skipPasswordPrompt
        env:
          # تخطي تثبيت SDK و JDK بما أنهما موجودان مسبقاً في runner
          BUBBLEWRAP_SKIP_JDK_INSTALL: "true"
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-APK
          path: ./*.apk
