name: Build APK Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          npm install -g @bubblewrap/cli
          # إنشاء الإعدادات بلا أسئلة
          bubblewrap init --manifest=https://chrsd-ca487.web.app/manifest.json --directory=./ --metaData.noStatusUpdate
          
          # بناء الـ APK مع إعطاء مسار الجافا اللي أنستالينا الفوق
          # هاد السطر كيجاوب "y" أوتوماتيكياً
          printf "y\n" | bubblewrap build --skipPasswordPrompt
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-APK
          path: ./*.apk
