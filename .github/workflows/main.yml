name: Fast APK Generator
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build APK (Force Build)
        run: |
          npm install -g @bubblewrap/cli
          # هاد السطر كيجاوب بـ "y" على كاع الأسئلة أوتوماتيكيا
          yes | bubblewrap init --manifest=https://chrsd-ca487.web.app/manifest.json --directory=./
          
          # هاد السطر كيبني الـ APK وكيتخطي طلب كلمة السر
          yes | bubblewrap build --skipPasswordPrompt
        env:
          # كنقولو لـ Bubblewrap تخدم بـ Java اللي كاينة في السيرفر
          BUBBLEWRAP_JDK_PATH: "/usr/lib/jvm/java-17-openjdk-amd64"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-APK
          path: ./*.apk
