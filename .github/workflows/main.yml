name: Generate APK from PWA
on:
  push:
    branches: [ main ] # غيخدم كل ما لحتِ كود جديد

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'

      - name: Install Bubblewrap and Build
        run: |
          npm install -g @bubblewrap/cli
          # هاد الأمر كياخد المانيفست ديالك ويحولها لـ مشروع أندرويد
          yes | bubblewrap init --manifest=https://chrsd-ca487.web.app/manifest.json
          yes | bubblewrap build
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v2
        with:
          name: app-release-apk
          path: ./*.apk
