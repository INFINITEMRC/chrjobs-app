name: Build APK Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap (The Secret Step)
        run: |
          # هاد الخطوة هي اللي كتعطي الأجوبة لـ Bubblewrap بلا ما يسول
          mkdir -p ~/.bubblewrap
          echo '{"jdkPath":"/usr/lib/jvm/java-17-openjdk-amd64","androidSdkPath":"/usr/local/lib/android/sdk"}' > ~/.bubblewrap/settings.json

      - name: Build APK
        run: |
          # دابا غادي يدوز نيشان بلا أسئلة
          bubblewrap init --manifest=https://chrsd-ca487.web.app/manifest.json --directory=./ --packageId=com.chrjobs.app --appName="CHR Jobs" --noStatusUpdate
          bubblewrap build --skipPasswordPrompt
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-App-APK
          path: ./*.apk
